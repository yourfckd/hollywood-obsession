name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        env:
          GITHUB_PAGES: "1"
        run: bun run build

      - name: Stage Pages output at /dist root
        run: |
          # TanStack Start emits the static client into dist/client.
          # Re-stage it so the deploy artifact is a single /dist root with
          # index.html at the top level (no /dist/client nesting).
          rm -rf dist-pages
          mkdir -p dist-pages
          cp -a dist/client/. dist-pages/
          rm -rf dist
          mv dist-pages dist
          # SPA fallback for deep links and refreshes on GitHub Pages.
          cp dist/index.html dist/404.html
          # Ensure Jekyll does not strip _-prefixed asset folders.
          touch dist/.nojekyll

      - name: Validate Pages artifact
        run: |
          test -f dist/index.html
          test -f dist/404.html
          grep -q '"/hollywood-obsession/' dist/index.html
          if grep -E '(<script[^>]+src|<link[^>]+href|<img[^>]+src)="/(assets|_build|src)/' dist/index.html; then
            echo "Found a root-relative asset URL; expected /hollywood-obsession/." >&2
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
