name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        run: bun run build

      - name: Add GitHub Pages fallback
        run: cp dist/client/index.html dist/client/404.html

      - name: Validate Pages artifact
        run: |
          test -f dist/client/index.html
          test -f dist/client/404.html
          grep -q '"/hollywood-obsession/' dist/client/index.html
          if grep -E '(<script[^>]+src|<link[^>]+href|<img[^>]+src)="/(assets|_build|src)/' dist/client/index.html; then
            echo "Found a root-relative asset URL; expected /hollywood-obsession/." >&2
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
